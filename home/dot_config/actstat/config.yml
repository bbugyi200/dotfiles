# actstat configuration — materializes at ~/.config/actstat/config.yml.
#
# Each `projects` entry is either an `org` (all repositories in that
# organization) or a single `repo` (`owner/name`). No secrets live here;
# actstat reads its GitHub token from the environment or `gh auth token`.
projects:
  - org: sase-org # all repositories in the sase-org organization
  - org: bobs-org # all repositories in the bobs-org organization
  - repo: bbugyi200/dotfiles # a single repository
  - repo: bbugyi200/actstat # this repository
