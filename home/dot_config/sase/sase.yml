timezone: "America/New_York"
use_chezmoi: true
github_orgs:
  - bbugyi200
  - sase-org
ace:
  snippets:
    agentm: 'the agent metadata panel on the "Agents" tab of the `sase ace` TUI'
    cb: |-
      ```$1
      $2
      ```
    cbb: |-
      ````$1
      $2
      ````
    cbi: "`<$1>`"
    fi: "the $1 file"
    fix: "Can you help me fix this?"
    fixx: "Can you help me diagnose the root cause of this issue and fix it?"
    git: "(see recent, related git commits)"
    gsn: "`sase ace` snapshot"
    gsna: "(see the `sase ace` snapshot below)"
    gta: 'the "$1" tab of the `sase ace` TUI'
    logp: "This issue is occurring on another machine that uses the ../sase-google plugin. I've saved a `sase logs` logpack to the ~/tmp/$1/ directory to help you figure this out."
    gtu: "the `sase ace` TUI"
    help: "Can you help me $1?"
    mrp: "Mentor Review panel"
    piw: "prompt input widget"

xprompts:
  # VCS project aliases
  gh_dotfiles: "#gh:dotfiles"
  gh_sase: "#gh:sase"
  # models
  flash: "gemini-3-flash-preview"
  codex: "gpt-5.3-codex"
  pro: "gemini-3.1-pro-preview"
  # %model aliases
  m_codex: "%model:#codex"
  m_flash: "%model:#flash"
  m_opus_codex: "%model(opus, #codex)"
  m_opus_sonnet: "%model(opus, sonnet)"
  m_pro: "%model:#pro"
  m_pro_flash: "%model(#pro, #flash)"
  m_sonnet: "%model:sonnet"
  m_swarm: "%model(opus, #codex, #pro)"
