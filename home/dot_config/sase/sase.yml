timezone: "America/New_York"
use_chezmoi: true
github_orgs:
  - bbugyi200
  - sase-org
ace:
  snippets:
    cb: |-
      ```$1
      $2
      ```
    cbb: |-
      ````$1
      $2
      ````
    cbi: "`<$1>`"
    fi: "the $1 file"
    fix: "Can you help me fix this?"
    fixx: "Can you help me diagnose the root cause of this issue and fix it?"
    git: "(see recent, related git commits)"
    help: "Can you help me $1?"

xprompts:
  # VCS project aliases
  gh_dotfiles: "#gh:dotfiles"
  gh_sase: "#gh:sase"
  # models
  flash: "gemini-3-flash-preview"
  codex: "gpt-5.3-codex"
  pro: "gemini-3.1-pro-preview"
  # %model aliases
  m_codex: "%model:#codex"
  m_flash: "%model:#flash"
  m_opus_codex: "%model(opus, #codex)"
  m_opus_sonnet: "%model(opus, sonnet)"
  m_pro: "%model:#pro"
  m_pro_flash: "%model(#pro, #flash)"
  m_sonnet: "%model:sonnet"
  m_swarm: "%model(opus, #codex, #pro)"
