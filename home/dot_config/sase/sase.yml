timezone: "America/New_York"
use_chezmoi: true
commit_hooks:
  before: "sase_git_fix"
github_orgs:
  - bbugyi200
  - sase-org
linked_repos:
  - name: chezmoi
    path: ~/.local/share/chezmoi
    description: |-
      Chezmoi-managed dotfiles and global SASE configuration source. Use `sase repo open` to access a private linked
      workspace when running from a numbered host workspace.
ace:
  snippets:
    # keep-sorted start
    Cmd: "The `$1` command"
    Key: |-
      The `$1` keymap
    ace: "`sase ace`"
    amac: "on another machine"
    amp: 'the agent metadata panel on the "Agents" tab of the `sase ace` TUI'
    awe: "agent/workflow entry"
    axe: "`sase axe`"
    can: "Can you $1?"
    cb: |-
      ```$1
      $2
      ```
    cbb: |-
      ````$1
      $2
      ````
    cbi: "`<$1>`"
    chez: "my chezmoi repo"
    cmd: "the `$1` command"
    cmdd: "a new `$1` command"
    cmt: "`sase commit`"
    cs: "ChangeSpec"
    di: "the $1 directory"
    drep: "Describe this repo."
    fi: "the $1 file"
    fix: "Can you help me fix this?"
    fixx: "Can you help me diagnose the root cause of this issue and fix it?"
    forw: |-
      {% for chat in wait_chats -%}

      - @{{ chat }}

      {% endif %}
    gact: "GitHub Actions"
    gactt: "GitHub Actions is failing with the below error."
    gh: "GitHub"
    gha: "GitHub Actions"
    git: "(see recent, related git commits)"
    gpti: "Can you use GPT image to generate a$1? Write the image to a new file in the $2."
    gsn: "`sase ace` snapshot"
    gsna: "(see the `sase ace` snapshot below)"
    gsnn: "in the below #[gsn]"
    gta: 'the "$1" tab of the `sase ace` TUI'
    gtu: "the `sase ace` TUI"
    h: "http://"
    help: "Can you help me $1?"
    helpp: "Can you now help me $1?"
    im: "IMPORTANT: "
    jya: "Justify your answer."
    key: "the `$1` keymap"
    keyy: "a new `$1` keymap"
    logp:
      "This issue is occurring on another machine that uses the ../sase-google plugin. I've saved a `sase logs` logpack
      to the ~/tmp/$1/ directory to help you figure this out."
    mrp: "Mentor Review panel"
    n: "%n:"
    ob: "Obsidian"
    piw: "prompt input widget"
    prp: "plan review panel"
    rep: "the ../sase-$1 repo"
    sa: "sase agent"
    sac: "SASE Admin Center"
    ss: |-
      /sase_
    w: "%w"
    x: "xprompt"
    xp: |-
      xprompt property
    xs: "xprompt skill"
    xw: "xprompt workflow"
    # keep-sorted end

telemetry:
  enabled: true
  prometheus:
    exposition_port: 9464
    pushgateway_url: "localhost:9091"

axe:
  lumberjacks:
    telegram:
      interval: 5
      chops:
        - name: tg_inbound
          description: "Process Telegram inline keyboard responses and text messages"
          env:
            SASE_TELEGRAM_BOT_USERNAME: sase_athena_bot
            SASE_TELEGRAM_BOT_CHAT_ID: "8990449281"
        - name: tg_outbound
          description: "Send unread notifications to Telegram"
          env:
            SASE_TELEGRAM_BOT_USERNAME: sase_athena_bot
            SASE_TELEGRAM_BOT_CHAT_ID: "8990449281"

llm_provider:
  default_effort: xhigh
  model_aliases:
    builtin:
      # Builtin alias overrides only. User-defined aliases belong under
      # model_aliases.custom so the Models panel and %model completion can show a
      # description.
      # Coder follow-ups: a Claude-authored plan hands coding to Codex and a
      # Codex-authored plan hands coding to Claude Opus (migrated from the retired
      # worker_models lane in epic sase-5d).
      claude_coder: gpt-5.6-sol
      # Remaining bead/epic role aliases are listed explicitly for readability;
      # each just tracks the default launch model (@default), the implicit default.
      coder: "@default"
      epic_creator: codex/gpt-5.6-sol
      epic_lander: "@smartest"
      phase_worker: codex/gpt-5.6-sol
    custom:
      research_a:
        model: codex/gpt-5.6-sol
        description: "Primary independent research-swarm researcher."
        bucket: researchers
      research_b:
        model: claude/opus
        description: "Assisting (second-opinion) research-swarm agents."
        bucket: researchers
      research_lead:
        model: "@smartest"
        description: "Final research-swarm lead and consolidator."
        bucket: researchers
      smartest:
        model: claude-fable-5
        description: "Shared highest-capability model alias."
    buckets:
      researchers:
        description: "Research-swarm model roles: primary researcher, second-opinion researcher, lead/consolidator."

xprompts:
  # keep-sorted start
  actstat:
    input:
      repo:
        type: word
        default: sase
        description: The name of the repo that is failing GitHub Actions.
    content: |-
      GitHub Actions is failing for the {{ repo }} repo. Can you run the `actstat` command to get more information about
      the failing jobs, diagnose the root cause of these failures, and then fix them?
  bea:
    snippet: true
    content: "I want you to lead the design on this one. Just make sure it looks beautiful!"
  beau:
    snippet: true
    content:
      "I want you to lead the design on this one. Make sure you design this feature so it is intuitive, reliable, and
      (last but not least) beautiful!"
  codex3: "gpt-5.3-codex"
  codex: "gpt-5.6-sol"
  gh_dotfiles: "#gh:dotfiles"
  gh_sase: "#gh:sase"
  m_agy: '%model("agy/Gemini 3.5 Flash (High)")'
  m_agy_pro: '%model("agy/Gemini 3.1 Pro (High)")'
  m_agy_pro_flash: '%{%m("agy/Gemini 3.1 Pro (High)") | %m("agy/Gemini 3.5 Flash (High)")}'
  m_codex: "%model:#codex"
  m_fable: "%m:claude/claude-fable-5"
  m_flash: "#m_agy"
  m_opus: "%model:opus"
  m_opus_codex: "%{%m:opus | %m:#codex}"
  m_opus_sonnet: "%{%m:opus | %m:sonnet}"
  m_qwen: "%model:qwen3.6-plus"
  m_sonnet: "%model:sonnet"
  m_spark: "%model:codex/gpt-5.3-codex-spark"
  m_swarm: '%{%m:opus | %m:#codex | %m("agy/Gemini 3.5 Flash (High)")}'
  nvim:
    snippet: true
    content: "Neovim (my neovim config lives in my chezmoi repo)"
  perf:
    snippet: true
    content: "Make sure your solution doesn't harm performance at all."
  prs/compare:
    input:
      pr_a: int
      pr_b: int
      task_type: { type: line, default: "feature" }
    snippet: prs
    content: |
      Can you help me compare PR #{{ pr_a }} with PR #{{ pr_b }}? Both of these PRs implement the same {{ task_type }}.
      End your analysis with a recommendation on which PR you would recommend merging and why. Also, look for ways that
      that we could improve the accepted PR by integrating parts of the rejected PRs changes (if the PR has a better
      interface or better tests, for example). Do NOT attempt to merge the accepted PR or make any file changes. You job
      is analysis ONLY!
  rchat:
    snippet: true
    content: "Review recent, related sase agent chats for context."
  research/image: |
    Can you use GPT image to generate an infographic that illustrates the main points made in this research markdown
    file? Write the image to a new file in the same directory.
  research/more: |
    Can you help me improve this research markdown file by doing your own research and filling in any gaps missed by the
    previous agent? Preserve the existing file path unless I explicitly ask for a new file, and follow
    $(sase sdd path research --ensure)/README.md conventions when present.
  research/prompt:
    input:
      prompt: text
    content: |
      Can you help me do some research on the below prompt? Investigate prior art, propose a few alternative solutions,
      and end your analysis with a recommended solution. #research

      ## THE PROMPT
      {{ prompt }}
  research: |
    Write this research to a new markdown file under the $(sase sdd path research --ensure)/$(date +%Y%m)/ directory.
  tale: |-
    #plan %a:tale
  # keep-sorted end
