timezone: "America/New_York"
use_chezmoi: true
precommit_command: "sase_git_fix"
github_orgs:
  - bbugyi200
  - sase-org
ace:
  snippets:
    ace: "`sase ace`"
    axe: "`sase axe`"
    amp: 'the agent metadata panel on the "Agents" tab of the `sase ace` TUI'
    cb: |-
      ```$1
      $2
      ```
    cbb: |-
      ````$1
      $2
      ````
    cbi: "`<$1>`"
    chez: "my chezmoi repo"
    cmt: "`sase commit`"
    cs: "ChangeSpec"
    fi: "the $1 file"
    fix: "Can you help me fix this?"
    fixx: "Can you help me diagnose the root cause of this issue and fix it?"
    git: "(see recent, related git commits)"
    gsn: "`sase ace` snapshot"
    gsna: "(see the `sase ace` snapshot below)"
    gta: 'the "$1" tab of the `sase ace` TUI'
    im: "IMPORTANT: "
    key: "the `$1` keymap"
    logp:
      "This issue is occurring on another machine that uses the ../sase-google plugin. I've saved a `sase logs` logpack
      to the ~/tmp/$1/ directory to help you figure this out."
    gtu: "the `sase ace` TUI"
    help: "Can you help me $1?"
    mrp: "Mentor Review panel"
    piw: "prompt input widget"
    rep: "the ../sase-$1 repo"
    x: xprompt
    xw: xprompt workflow

xprompts:
  # snippets
  bea:
    snippet: true
    content: "I want you to lead the design on this one. Just make sure it looks beautiful!"
  beau:
    snippet: true
    content:
      "I want you to lead the design on this one. Make sure you design this feature so it is intuitive, reliable, and
      (last but not least) beautiful!"
  nvim:
    snippet: true
    content: "Neovim (my neovim config lives in my chezmoi repo)"
  # VCS project aliases
  gh_dotfiles: "#gh:dotfiles"
  gh_sase: "#gh:sase"
  # models
  flash: "gemini-3-flash-preview"
  codex: "gpt-5.3-codex"
  pro: "gemini-3.1-pro-preview"
  # %model aliases
  m_codex: "%model:#codex"
  m_flash: "%model:#flash"
  m_opus_codex: "%model(opus, #codex)"
  m_opus_sonnet: "%model(opus, sonnet)"
  m_pro: "%model:#pro"
  m_pro_flash: "%model(#pro, #flash)"
  m_sonnet: "%model:sonnet"
  m_swarm: "%model(opus, #codex, #pro)"
  prs/compare:
    input:
      pr_a: int
      pr_b: int
      task_type: { type: line, default: "feature" }
    content: |
      Can you help me compare PR #{{ pr_a }} with PR #{{ pr_b }}? Both of these PRs implement the same {{ task_type }}.
      End your analysis with a recommendation on which PR you would recommend merging and why. Also, look for ways that
      that we could improve the accepted PR by integrating parts of the rejected PRs changes (if the PR has a better
      interface or better tests, for example). Do NOT attempt to merge the accepted PR or make any file changes. You job
      is analysis ONLY!
