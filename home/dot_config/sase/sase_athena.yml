chat_install:
  command: "install_sase_github"

llm_provider:
  provider: codex

workflows:
  refresh_docs:
    input:
      project: { type: line, default: "sase" }
      gh_ref: { type: line, default: "sase" }
      threshold: { type: int, default: 50 }

    steps:
      - name: count_commits
        hidden: true
        python: |
          import subprocess
          from pathlib import Path

          marker = Path.home() / ".sase" / "projects" / "{{ project }}" / "refresh_docs_marker"
          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()

          if marker.exists():
              parts = marker.read_text().strip().split()
              last_sha = parts[0]
              last_ts = parts[1] if len(parts) > 1 else None
              check = subprocess.run(["git", "cat-file", "-t", last_sha], capture_output=True)
              if check.returncode == 0:
                  result = subprocess.check_output(
                      ["git", "rev-list", "--count", f"{last_sha}..HEAD"], text=True
                  )
                  count = int(result.strip())
              elif last_ts:
                  result = subprocess.check_output(
                      ["git", "rev-list", "--count", f"--after={last_ts}", "HEAD"], text=True
                  )
                  count = int(result.strip())
              else:
                  count = 999  # Old-format marker with no timestamp, force a refresh
          else:
              count = 999  # First run, force a refresh

          print(f"count={count}")
          print(f"head={head}")
        output:
          count: int
          head: line

      - name: launch_docs_agents
        hidden: true
        if: "{{ count_commits.count >= threshold }}"
        python: |
          import re
          import subprocess
          import textwrap

          from sase.agent.launcher import launch_agent_from_cwd
          from sase.agent.multi_prompt import build_wait_chained_multi_prompt

          project = "{{ project }}"
          gh_ref = "{{ gh_ref }}"
          safe_project = re.sub(r"[^A-Za-z0-9_.]+", "_", project).strip("_") or "repo"
          head = subprocess.check_output(["git", "rev-parse", "--short=12", "HEAD"], text=True).strip()
          name_prefix = f"refresh_docs.{safe_project}.{head}"

          docs_prompt = textwrap.dedent(f"""
          %name:{name_prefix}.update
          #gh:{gh_ref} %g:chop #sase/docs
          """).strip()

          polish_prompt = textwrap.dedent(f"""
          %name:{name_prefix}.polish
          #gh:{gh_ref} %g:chop #resume

          Inspect the documentation changes made by the first refresh-docs agent.
          Verify descriptions against the current system behavior rather than assuming they are true.
          Improve clarity for a new user, especially where terminology or workflow ordering could be misunderstood.
          Keep edits scoped to documentation unless a tiny companion correction is required.
          If you change files, run the appropriate documentation checks for this repository.
          """).strip()

          multi_prompt = build_wait_chained_multi_prompt([docs_prompt, polish_prompt])
          launch_agent_from_cwd(multi_prompt)
          print("launched=2")
        output: { launched: int }

      - name: update_marker
        if: "{{ count_commits.count >= threshold and launch_docs_agents.launched > 0 }}"
        python: |
          import subprocess
          from pathlib import Path

          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          ts = subprocess.check_output(["git", "log", "-1", "--format=%ct", "HEAD"], text=True).strip()
          marker = Path.home() / ".sase" / "projects" / "{{ project }}" / "refresh_docs_marker"
          marker.parent.mkdir(parents=True, exist_ok=True)
          marker.write_text(f"{head} {ts}")
          print("updated=true")
        output: { updated: bool }

  audit_recent_bugs:
    input:
      project: { type: line, default: "sase" }
      gh_ref: { type: line, default: "sase" }
      threshold: { type: int, default: 50 }

    steps:
      - name: count_recent_bug_audit_commits
        hidden: true
        python: |
          import subprocess
          from pathlib import Path

          marker = Path.home() / ".sase" / "projects" / "{{ project }}" / "recent_bug_audit_marker"
          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          head_short = subprocess.check_output(["git", "rev-parse", "--short=12", "HEAD"], text=True).strip()

          if marker.exists():
              parts = marker.read_text().strip().split()
              last_sha = parts[0]
              last_ts = parts[1] if len(parts) > 1 else None
              check = subprocess.run(["git", "cat-file", "-t", last_sha], capture_output=True)
              if check.returncode == 0:
                  result = subprocess.check_output(
                      ["git", "rev-list", "--count", f"{last_sha}..HEAD"], text=True
                  )
                  count = int(result.strip())
                  base_kind = "sha"
                  base_ref = last_sha
                  base_context = f"marker SHA {last_sha}"
                  range_desc = f"{last_sha}..{head}"
              elif last_ts:
                  result = subprocess.check_output(
                      ["git", "rev-list", "--count", f"--after={last_ts}", "HEAD"], text=True
                  )
                  count = int(result.strip())
                  base_kind = "timestamp"
                  base_ref = last_ts
                  base_context = f"marker SHA missing; using marker timestamp {last_ts}"
                  range_desc = f"commits after unix timestamp {last_ts} through {head}"
              else:
                  count = 999  # Old-format marker with no timestamp, force an audit
                  base_kind = "forced"
                  base_ref = last_sha
                  base_context = f"old marker SHA {last_sha} has no timestamp"
                  range_desc = f"forced audit through {head}"
          else:
              count = 999  # First run, force an audit
              base_kind = "first-run"
              base_ref = "none"
              base_context = "no marker file exists"
              range_desc = f"first audit through {head}"

          print(f"count={count}")
          print(f"head={head}")
          print(f"head_short={head_short}")
          print(f"base_kind={base_kind}")
          print(f"base_ref={base_ref}")
          print(f"base_context={base_context}")
          print(f"range_desc={range_desc}")
          print(f"marker={marker}")
        output:
          count: int
          head: line
          head_short: word
          base_kind: word
          base_ref: line
          base_context: line
          range_desc: line
          marker: line

      - name: launch_bug_audit_agent
        hidden: true
        if: "{{ count_recent_bug_audit_commits.count >= threshold }}"
        python: |
          import re
          import textwrap

          from sase.agent.launcher import launch_agent_from_cwd

          project = "{{ project }}"
          gh_ref = "{{ gh_ref }}"
          head = "{{ count_recent_bug_audit_commits.head }}"
          head_short = "{{ count_recent_bug_audit_commits.head_short }}"
          safe_project = re.sub(r"[^A-Za-z0-9_.]+", "_", project).strip("_") or "repo"
          safe_pr_project = re.sub(r"[^A-Za-z0-9_]+", "_", project).strip("_") or "repo"
          pr_name = f"recent_bug_audit_{safe_pr_project}_{head_short}"
          name_prefix = f"audit_bugs.{safe_project}.{head_short}"

          prompt = textwrap.dedent(f"""
          %name:{name_prefix}
          #gh:{gh_ref} %g:chop #pr({pr_name})

          Audit recent commits in {project} for bugs.

          Review scope:
          - Marker file: {{ count_recent_bug_audit_commits.marker }}
          - Base selection: {{ count_recent_bug_audit_commits.base_context }}
          - Commit range: {{ count_recent_bug_audit_commits.range_desc }}
          - Current HEAD: {head}
          - Commit count since marker: {{ count_recent_bug_audit_commits.count }}

          Inspect every commit in this since-last-run range for confirmed bugs, correctness regressions, broken edge
          cases, unsafe error handling, race conditions, data loss risks, or test failures introduced by these commits.

          Fix confirmed issues only. Avoid unrelated improvements, style-only edits, speculative refactors, broad
          rewrites, or preference changes. If no confirmed bug is found, leave the worktree untouched and report that
          outcome.

          When you change files, run the focused checks appropriate to the affected code.
          """).strip()

          launch_agent_from_cwd(prompt)
          print("launched=1")

      - name: update_recent_bug_audit_marker
        if: "{{ count_recent_bug_audit_commits.count >= threshold }}"
        python: |
          import subprocess
          from pathlib import Path

          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          ts = subprocess.check_output(["git", "log", "-1", "--format=%ct", "HEAD"], text=True).strip()
          marker = Path.home() / ".sase" / "projects" / "{{ project }}" / "recent_bug_audit_marker"
          marker.parent.mkdir(parents=True, exist_ok=True)
          marker.write_text(f"{head} {ts}")
          print("updated=true")
        output: { updated: bool }

