axe:
  lumberjacks:
    run_every:
      interval: 60
      chops:
        - name: sase_pylimit_split
          description: "Run the #!sase/pylimit_split xprompt workflow"
          agent: "#gh:sase %g:chop #!sase/pylimit_split %approve"
          run_every: 60m
        - name: sase_fix_just
          description: "Run the #!sase/fix_just xprompt workflow"
          agent: "#gh:sase %g:chop #!sase/fix_just"
          run_every: 60m
    code_quality:
      interval: 60
      chops:
        - name: sase_recent_bug_audit
          description: "Audit recent sase commits for confirmed bugs and fix only verified issues"
          agent: "#gh:sase %g:chop #!audit_recent_bugs"
          run_every: 60m
        - name: sase_recent_improvement_audit
          description: "Audit recent sase commits for clear objective improvements without speculative churn"
          agent: "#gh:sase %g:chop #!audit_recent_improvements"
          run_every: 60m
    refresh_docs:
      interval: 60
      chops:
        - name: sase_refresh_docs
          description: "Run the #!refresh_docs xprompt workflow"
          agent: "#gh:sase %g:chop #!refresh_docs"
          run_every: 60m
        - name: sase_core_refresh_docs
          description: "Run the #!refresh_docs xprompt workflow for sase-core"
          agent:
            "#gh:sase-org/sase-core %g:chop #!refresh_docs(project=sase-core, gh_ref=sase-org/sase-core, threshold=25)"
          run_every: 24h
        - name: sase_github_refresh_docs
          description: "Run the #!refresh_docs xprompt workflow for sase-github"
          agent:
            "#gh:sase-org/sase-github %g:chop #!refresh_docs(project=sase-github, gh_ref=sase-org/sase-github,
            threshold=25)"
          run_every: 24h
        - name: sase_nvim_refresh_docs
          description: "Run the #!refresh_docs xprompt workflow for sase-nvim"
          agent:
            "#gh:sase-org/sase-nvim %g:chop #!refresh_docs(project=sase-nvim, gh_ref=sase-org/sase-nvim, threshold=25)"
          run_every: 24h
        - name: sase_telegram_refresh_docs
          description: "Run the #!refresh_docs xprompt workflow for sase-telegram"
          agent:
            "#gh:sase-org/sase-telegram %g:chop #!refresh_docs(project=sase-telegram, gh_ref=sase-org/sase-telegram,
            threshold=25)"
          run_every: 24h
    github_actions:
      interval: 300
      chop_timeout: "120s"
      chops:
        - name: gh_actions_fix
          description: "Launch a fixer agent when the latest GitHub Actions run fails"
          run_every: "15m"
          timeout: "120s"
          env:
            SASE_GHA_FIX_REPOS: "bbugyi200/dotfiles"
    telegram:
      interval: 5
      chops:
        - name: tg_inbound
          description: "Process Telegram inline keyboard responses and text messages"
          env:
            SASE_TELEGRAM_BOT_USERNAME: sase_athena_bot
            SASE_TELEGRAM_BOT_CHAT_ID: "8764730819"
        - name: tg_outbound
          description: "Send unread notifications to Telegram when user is inactive"
          env:
            SASE_TELEGRAM_BOT_USERNAME: sase_athena_bot
            SASE_TELEGRAM_BOT_CHAT_ID: "8764730819"
