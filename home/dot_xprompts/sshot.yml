description: Reference a recent MacBook screenshot uploaded to Apollo as an inline @image.

input:
  - name: n
    type: int
    default: 1
    description: Which screenshot to fetch, counting back from the newest (1 = most recent).

steps:
  - name: fetch
    hidden: true
    bash: |
      n="{{ n }}"
      if [ "$n" -lt 1 ]; then
        echo "ERROR: n must be >= 1 (got '$n')" >&2
        exit 1
      fi

      # Ask Apollo for the nth most recent supported image (newest first). The
      # globs and ~ are expanded by the remote shell; n is a validated integer.
      basename=$(ssh apollo "cd ~/tmp/screenshots 2>/dev/null && ls -1t -- *.png 2>/dev/null | sed -n '${n}p'")
      if [ -z "$basename" ]; then
        echo "ERROR: no screenshot #$n found on apollo (~/tmp/screenshots)" >&2
        exit 1
      fi

      mkdir -p ~/tmp/screenshots
      if ! scp -pq "apollo:~/tmp/screenshots/$basename" ~/tmp/screenshots/"$basename" >&2; then
        echo "ERROR: failed to copy '$basename' from apollo" >&2
        exit 1
      fi

      echo "local_path=$HOME/tmp/screenshots/$basename"
    output: { local_path: path }

  - name: inject
    prompt_part: |
      @{{ fetch.local_path }}
