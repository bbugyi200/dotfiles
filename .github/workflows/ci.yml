name: CI
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ["${{ matrix.os }}"]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install prettier
        run: npm install -g prettier

      - name: Install luarocks
        run: sudo apt-get update && sudo apt-get install -y luarocks

      - name: Install lua-language-server
        run: |
          LLS_VERSION=3.13.5
          mkdir -p "$HOME/lua-language-server"
          curl -sL "https://github.com/LuaLS/lua-language-server/releases/download/$LLS_VERSION/lua-language-server-$LLS_VERSION-linux-x64.tar.gz" \
            | tar xz -C "$HOME/lua-language-server"
          echo "$HOME/lua-language-server/bin" >> $GITHUB_PATH

      - name: Install Lua linters
        run: |
          luarocks install --local llscheck
          luarocks install --local luacheck
          echo "$HOME/.luarocks/bin" >> $GITHUB_PATH

      - uses: extractions/setup-just@v2

      - uses: astral-sh/setup-uv@v4

      - name: Run linters
        run: just lint
  test:
    runs-on: ["${{ matrix.os }}"]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install luarocks
        run: sudo apt-get update && sudo apt-get install -y luarocks

      - name: Set up Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install Lua test tools
        run: |
          luarocks install --local nlua
          luarocks install --local busted
          echo "$HOME/.luarocks/bin" >> $GITHUB_PATH
          echo "LUA_PATH=$(luarocks path --local --lr-path);;" >> $GITHUB_ENV
          echo "LUA_CPATH=$(luarocks path --local --lr-cpath);;" >> $GITHUB_ENV

      - name: Install bashunit
        run: |
          curl -s https://bashunit.typeddevs.com/install.sh | bash -s bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - uses: extractions/setup-just@v2

      - uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: just test
