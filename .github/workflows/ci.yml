name: CI
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ["${{ matrix.os }}"]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install prettier
        run: npm install -g prettier

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "luajit-2.1"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install lua-language-server
        run: |
          LLS_VERSION=3.13.5
          mkdir -p "$HOME/lua-language-server"
          curl -sL "https://github.com/LuaLS/lua-language-server/releases/download/$LLS_VERSION/lua-language-server-$LLS_VERSION-linux-x64.tar.gz" \
            | tar xz -C "$HOME/lua-language-server"
          echo "$HOME/lua-language-server/bin" >> "$GITHUB_PATH"

      - name: Install Lua linters
        run: |
          luarocks install llscheck
          luarocks install luacheck

      - uses: extractions/setup-just@v2

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Cache Go binaries
        id: cache-go-bin
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-bin-v4-linux-amd64-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install Go tools (keep-sorted)
        if: steps.cache-go-bin.outputs.cache-hit != 'true'
        run: |
          CGO_ENABLED=0 go install github.com/google/keep-sorted@latest

      - name: Run linters
        run: just lint
  test:
    runs-on: ["${{ matrix.os }}"]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "luajit-2.1"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Set up Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install Lua test tools
        run: |
          luarocks install nlua
          luarocks install busted
          luarocks install luacov

      - name: Install bashunit
        run: |
          curl -fsSL https://bashunit.com/install.sh -o "$RUNNER_TEMP/bashunit-install.sh"
          bash "$RUNNER_TEMP/bashunit-install.sh" "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - uses: extractions/setup-just@v2

      - uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: just test
